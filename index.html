<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Dia dos Namorados</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-deep:   #f472b6;
      --pink-mid:    #fb7bc8;
      --pink-soft:   #fce7f3;
      --pink-light:  #fdf2f8;
      --rose:        #e11d48;
      --cream:       #fff5f9;
      --text-dark:   #4a1535;
      --text-mid:    #7e3060;
    }

    html, body {
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fce7f3 0%, #fdf2f8 40%, #fce7f3 100%);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── floating hearts bg ── */
    .hearts-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: .6; }
      90%  { opacity: .4; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* ── screens ── */
    .screen {
      display: none;
      position: relative; z-index: 1;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem 1rem;
      text-align: center;
    }
    .screen.active { display: flex; }

    /* ── card ── */
    .card {
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(244,114,182,.3);
      border-radius: 2rem;
      padding: 2.8rem 2.4rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(225,29,72,.12);
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--rose);
      line-height: 1.2;
      margin-bottom: .5rem;
    }
    h2 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.3rem, 4vw, 2rem);
      color: var(--rose);
      margin-bottom: 1rem;
    }
    .subtitle {
      font-size: .95rem;
      color: var(--text-mid);
      margin-bottom: 2rem;
    }

    /* ── emoji big ── */
    .emoji-big { font-size: 3.5rem; margin-bottom: 1rem; display: block; }

    /* ── main question buttons ── */
    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.8rem;
    }
    .btn {
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      padding: .75rem 2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      user-select: none;
    }
    .btn:active { transform: scale(.97); }

    .btn-yes {
      background: linear-gradient(135deg, #f472b6, #e11d48);
      color: #fff;
      box-shadow: 0 4px 18px rgba(225,29,72,.35);
    }
    .btn-yes:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(225,29,72,.45); }

    /* NÃO button – começa lado a lado com o SIM dentro do fluxo normal */
    #btn-no {
      background: #e2e8f0;
      color: #64748b;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      position: relative;
      z-index: 9999;
    }

    /* quando o JS marca como "fugindo", passa a ser fixed na tela */
    #btn-no.is-fixed {
      position: fixed;
      transition: none;
    }

    /* ── activity grid ── */
    .activity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: .8rem;
      margin-top: 1.2rem;
    }
    .act-btn {
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      border: 1.5px solid #f9a8d4;
      border-radius: 1rem;
      padding: .8rem .6rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      color: var(--text-dark);
      transition: background .2s, transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
    }
    .act-btn:hover {
      background: linear-gradient(135deg, #f9a8d4, #f472b6);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(244,114,182,.4);
    }
    .act-btn .act-icon { font-size: 1.6rem; }

    /* ── time picker ── */
    .time-section { margin-top: 1.4rem; }
    .time-section label {
      font-size: .9rem; font-weight: 600; color: var(--text-mid);
      display: block; margin-bottom: .4rem;
    }
    .time-section input[type="time"] {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--rose);
      border: 2px solid #f9a8d4;
      border-radius: .8rem;
      padding: .5rem 1.2rem;
      background: #fff;
      outline: none;
      width: 100%;
      max-width: 200px;
    }
    .time-section input[type="time"]:focus { border-color: #e11d48; }

    .btn-confirm {
      margin-top: 1.4rem;
      background: linear-gradient(135deg, #f472b6, #e11d48);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: .8rem 2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(225,29,72,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-confirm:hover { transform: scale(1.05); }
    .btn-confirm:disabled { opacity: .6; cursor: default; transform: none; }

    /* ── success ── */
    #screen-done .card { max-width: 440px; }
    #screen-done h1 { font-size: clamp(1.5rem,4vw,2.4rem); }
    .confetti-row { font-size: 2rem; letter-spacing: .3rem; margin: .6rem 0 1.2rem; }

    /* ── selected highlight ── */
    .act-btn.selected {
      background: linear-gradient(135deg, #f9a8d4, #e11d48);
      color: #fff;
      box-shadow: 0 4px 14px rgba(225,29,72,.4);
    }

    /* ── back link ── */
    .back-link {
      margin-top: 1.2rem;
      font-size: .8rem;
      color: var(--text-mid);
      cursor: pointer;
      text-decoration: underline;
      opacity: .7;
    }
    .back-link:hover { opacity: 1; }

    /* status msg */
    #send-status {
      margin-top: .8rem;
      font-size: .85rem;
      color: var(--text-mid);
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="hearts-bg"></div>

<!-- ═══════════════════════════════ SCREEN 1 – PERGUNTA ═══════════════════════════════ -->
<div class="screen active" id="screen-main">
  <div class="card">
    <h1>Aceita sair comigo?</h1>
    <p class="subtitle">Hoje é Dia dos Namorados — dia perfeito pra isso</p>
    <div class="btn-row">
      <button class="btn btn-yes" onclick="goActivities()">SIM</button>
      <button class="btn" id="btn-no">NÃO</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 2 – ATIVIDADES ════════════════════════════ -->
<div class="screen" id="screen-activities">
  <div class="card">
    <h2>Que ótimo! O que você quer fazer?</h2>
    <p class="subtitle">Escolha a sua ideia favorita</p>
    <div class="activity-grid">
      <button class="act-btn" onclick="selectActivity(this,'Cinema')">
        Cinema
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Sushi')">
        Sushi
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Hambúrguer')">
        Hambúrguer
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Boliche')">
        Boliche
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Praia')">
        Praia
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Comida Mexicana')">
        Comida Mexicana
      </button>
      <button class="act-btn" onclick="selectActivity(this,'Comida Italiana')">
        Comida Italiana
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 3 – HORÁRIO ══════════════════════════════ -->
<div class="screen" id="screen-time">
  <div class="card">
    <h2 id="time-title">Que hora?</h2>
    <p class="subtitle">Dia dos Namorados — 12 de junho</p>

    <div class="time-section">
      <label>Escolha o horário:</label>
      <input type="time" id="time-input" value="19:00" />
    </div>

    <br>
    <button class="btn-confirm" id="btn-confirm" onclick="confirmTime()">Marcar horário</button>
    <div id="send-status"></div>
    <span class="back-link" onclick="goActivities()">← Mudar atividade</span>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 4 – CONFIRMADO ════════════════════════════ -->
<div class="screen" id="screen-done">
  <div class="card">
    <h1>Tá marcado!</h1>
    <p class="subtitle" id="done-msg"></p>
    <p style="margin-top:1rem;font-size:.9rem;color:var(--text-mid);">
      Já enviei a confirmação no e-mail dele.<br>
      Vai ser incrível!
    </p>
  </div>
</div>

<script>
emailjs.init({ publicKey: "-WqGPMWEPsVXoiQ2u" });

const EMAILJS_SERVICE  = "service_lx7c7dk";
const EMAILJS_TEMPLATE = "template_zs6oju6";
const DEST_EMAIL       = "joaobody27@gmail.com";

let chosenActivity = "";

/* ───────── BOTÃO "NÃO" SO FOGE QUANDO TENTAM CLICAR/TOCAR ───────── */

const btnNo = document.getElementById('btn-no');
let noIsFixed = false;

function moveButton() {
  // na primeira fuga, converte de posição normal (lado a lado) para fixed
  if (!noIsFixed) {
    const r = btnNo.getBoundingClientRect();
    btnNo.classList.add('is-fixed');
    btnNo.style.left = r.left + 'px';
    btnNo.style.top = r.top + 'px';
    noIsFixed = true;
  }

  const bw = btnNo.offsetWidth || 100;
  const bh = btnNo.offsetHeight || 40;

  const maxX = Math.max(10, window.innerWidth - bw - 20);
  const maxY = Math.max(10, window.innerHeight - bh - 20);

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btnNo.style.left = x + 'px';
  btnNo.style.top = y + 'px';
}

// foge ao clicar
btnNo.addEventListener('click', function(e) {
  e.preventDefault();
  moveButton();
});

// foge ao tocar (mobile)
btnNo.addEventListener('touchstart', function(e) {
  e.preventDefault();
  moveButton();
}, { passive: false });

/* ───────── NAVEGAÇÃO ENTRE TELAS ───────── */

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goActivities() {
  btnNo.style.display = 'none';
  showScreen('screen-activities');
}

function selectActivity(el, name) {
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  chosenActivity = name;

  setTimeout(() => {
    document.getElementById('time-title').textContent = name + ' — que hora?';
    showScreen('screen-time');
  }, 280);
}

async function confirmTime() {
  const timeVal = document.getElementById('time-input').value;

  if (!timeVal) {
    alert('Escolha um horário!');
    return;
  }

  const [h, m] = timeVal.split(':');
  const display = h + ':' + m;

  const btn = document.getElementById('btn-confirm');

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    await emailjs.send(
      EMAILJS_SERVICE,
      EMAILJS_TEMPLATE,
      {
        to_email: DEST_EMAIL,
        activity: chosenActivity,
        time: display,
        date: new Date().toLocaleDateString('pt-BR'),
        message: 'Marcado! ' + chosenActivity + ' às ' + display
      }
    );
  } catch(err) {
    console.warn(err);
  }

  document.getElementById('done-msg').textContent =
    chosenActivity + ' às ' + display;

  showScreen('screen-done');
}
</script>
</body>
</html>
